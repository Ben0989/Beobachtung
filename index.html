<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bewertungsbogen Fahrlehrer</title>

<style>
body {
  font-family: Arial;
  background:#f4f6f8;
  padding:20px;
}

h1, h2 {
  margin-top:25px;
}

.section {
  background:#fff;
  padding:15px;
  border-radius:8px;
  margin-bottom:20px;
}

.row {
  display:flex;
  align-items:center;
  margin:6px 0;
}

.label {
  width:420px;
}

.smiley span {
  font-size:20px;
  cursor:pointer;
  margin-right:6px;
  opacity:0.4;
}

.smiley span.active {
  opacity:1;
}

input[type="text"] {
  flex:1;
  padding:5px;
  margin-left:10px;
}

.top {
  margin-bottom:20px;
}
</style>
</head>

<body>

<h1>Bewertungsbogen Fahrlehrer</h1>

<div class="top">
  <label><b>Name der FLA:</b></label>
  <input type="text" id="name" placeholder="Name eingeben...">
</div>

<div id="content"></div>

<script>
const structure = [
{
title:"Verkehrsbeobachtung",
items:[
"Andere Verkehrsteilnehmer – Auf Fahrbahn (Autos, LKW, Motorräder, Abstand, Geschwindigkeit, Spurwechsel)",
"Andere Verkehrsteilnehmer – Neben Fahrbahn (Fußgänger, Radfahrer, Querungsabsicht, Kinder, Haltestellen)",
"Verkehrszeichen – Erkennen, Verstehen, Umsetzung, Zusatzzeichen",
"Spiegelbeobachtung – Regelmäßigkeit, Anlassbezug, Schulterblick, Einschätzung nachfolgender Verkehr"
]
},
{
title:"Fahrzeugpositionierung",
items:[
"Positionierung im Fahrstreifen (Rechtsfahrgebot, Abstand, Fahrstreifenwahl)",
"Kommunikation durch Fahrzeugpositionierung",
"Positionierung bei Fahrmanövern (Parken, Wenden, Rückwärtsfahren)"
]
},
{
title:"Geschwindigkeitsanpassung",
items:[
"bei Gefahrenstellen",
"bei unübersichtlichen Stellen",
"bei unklarer Verkehrslage",
"bei Kurven",
"bei Fahraufgaben"
]
},
{
title:"Kommunikation",
items:[
"Durch Blinker, Hupe, Lichthupe, Handzeichen",
"Durch Fahrzeugpositionierung"
]
},
{
title:"Fahrzeugbedienung & Umweltschonende Fahrweise",
items:[
"Umgang mit Bedienelementen",
"Vorausschauende Fahrweise (Frühes Gas wegnehmen, Frühes Verzögern, sanft fahren, sanft abbremsen)",
"Schalten (Kupplung, Gangwahl)"
]
}
];

const content = document.getElementById("content");
let data = JSON.parse(localStorage.getItem("bewertung2")) || {};

structure.forEach((section, si)=>{
  const div = document.createElement("div");
  div.className="section";

  const title = document.createElement("h2");
  title.textContent = section.title;
  div.appendChild(title);

  section.items.forEach((item, ii)=>{
    const key = si+"-"+ii;

    const row = document.createElement("div");
    row.className="row";
    row.dataset.key = key;

    const label = document.createElement("div");
    label.className="label";
    label.textContent = item;

    const smiley = document.createElement("div");
    smiley.className="smiley";

    ["🟢","🟡","🔴"].forEach((s, idx)=>{
      const span = document.createElement("span");
      span.textContent = s;
      span.onclick = ()=>{
        data[key] = data[key] || {};

        if(data[key].rating === idx+1){
          delete data[key].rating;
        } else {
          data[key].rating = idx+1;
        }

        data[key].label = item;
        save();
      };
      smiley.appendChild(span);
    });

    const input = document.createElement("input");
    input.type="text";
    input.placeholder="Kommentar...";
    input.value = data[key]?.comment || "";
    input.oninput = ()=>{
      data[key] = data[key] || {};
      data[key].comment = input.value;
      data[key].label = item;
      save();
    };

    row.appendChild(label);
    row.appendChild(smiley);
    row.appendChild(input);

    div.appendChild(row);
  });

  content.appendChild(div);
});

function save(){
  localStorage.setItem("bewertung2", JSON.stringify(data));
  updateUI();
}

function updateUI(){
  let total = 0;
  let max = 0;

  let good = [];
  let mid = [];
  let bad = [];
  let comments = [];

  document.querySelectorAll(".row").forEach((row)=>{
    const spans = row.querySelectorAll("span");
    const key = row.dataset.key;

    spans.forEach(s => s.classList.remove("active"));

    if(data[key]?.rating){
      const rating = data[key].rating;

      spans[rating-1].classList.add("active");

      total += (4 - rating);
      max += 3;

      const label = row.querySelector(".label").textContent;
      const comment = data[key]?.comment;

      if(comment && comment.length > 3){
        comments.push(comment);
      }

      if(rating === 1) good.push(label);
      if(rating === 2) mid.push(label);
      if(rating === 3) bad.push(label);

    } else {
      max += 3;
    }
  });

  let percent = max ? (total / max) * 100 : 0;
  let grade = "-";

  if(document.getElementById("ko")?.checked){
    grade = 6;
  } else {
    if(percent>=92) grade=1;
    else if(percent>=81) grade=2;
    else if(percent>=67) grade=3;
    else if(percent>=50) grade=4;
    else if(percent>=30) grade=5;
    else grade=6;
  }

  document.getElementById("points").textContent = total;
  document.getElementById("percent").textContent = percent.toFixed(1);
  document.getElementById("grade").textContent = grade;

  generateFeedback(good, mid, bad, comments);
}

// === AUSWERTUNG + FEEDBACK ===

const summary = document.createElement("div");
summary.innerHTML = `
  <div style="background:#fff;padding:15px;border-radius:8px;margin-top:20px;">
    <h2>Auswertung</h2>
    <p>Punkte: <span id="points">0</span></p>
    <p>Prozent: <span id="percent">0</span>%</p>
    <p>Note: <span id="grade">-</span></p>
    <label><input type="checkbox" id="ko"> KO-Kriterium</label>

    <h2>Feedback</h2>
    <textarea id="feedback" style="width:100%;height:120px;"></textarea>
  </div>
`;
document.body.appendChild(summary);

// WICHTIG: erst jetzt aufrufen
updateUI();

// Feedback (Sandwich)
function generateFeedback(good, mid, bad, comments){
  let text = "";

  if(good.length){
    text += "Positiv: Besonders sicher und strukturiert war die Leistung bei " 
      + good.slice(0,2).join(", ") + ". ";
  }

  if(bad.length){
    text += "Verbesserung: Deutliche Schwächen zeigten sich bei " 
      + bad.slice(0,2).join(", ") + ". ";
  } else if(mid.length){
    text += "Verbesserung: Teilweise noch unsicher bei " 
      + mid.slice(0,2).join(", ") + ". ";
  }

  if(comments.length){
    text += "Beobachtungen: " + comments.slice(0,2).join(" | ") + ". ";
  }

  if(good.length){
    text += "Abschließend: Insgesamt eine stabile Leistung mit guten Ansätzen im Bereich " 
      + good[0] + ".";
  } else {
    text += "Abschließend: Insgesamt noch ausbaufähig, Fokus auf grundlegende Sicherheit.";
  }

  const feedbackEl = document.getElementById("feedback");
  if(feedbackEl){
    feedbackEl.value = text;
  }
}
  
</script>

</body>
</html>
