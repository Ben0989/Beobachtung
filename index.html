<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bewertungsbogen Fahrlehrer</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
h1, h2 { margin-top:25px; }

.section {
  background:#fff;
  padding:15px;
  border-radius:8px;
  margin-bottom:20px;
}

.row {
  display:flex;
  align-items:center;
  margin:6px 0;
}

.label { width:420px; }

.smiley span {
  font-size:20px;
  cursor:pointer;
  margin-right:6px;
  opacity:0.4;
}

.smiley span.active { opacity:1; }

input[type="text"] {
  flex:1;
  padding:5px;
  margin-left:10px;
}

.summary {
  background:#fff;
  padding:15px;
  border-radius:8px;
  margin-top:20px;
}

textarea {
  width:100%;
  height:120px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>Bewertungsbogen Fahrlehrer</h1>

<div>
  <b>Name der FLA:</b>
  <input type="text" id="name">
</div>

<div id="content"></div>

<div class="summary">
  <h2>Auswertung</h2>
  <p>Punkte: <span id="points">0</span></p>
  <p>Prozent: <span id="percent">0</span>%</p>
  <p>Note: <span id="grade">-</span></p>
  <label><input type="checkbox" id="ko"> KO-Kriterium</label>

  <h2>Feedback (Sandwich-Methode)</h2>
  <textarea id="feedback" readonly></textarea>
</div>

<script>
const structure = [
{title:"Verkehrsbeobachtung", items:[
"Andere Verkehrsteilnehmer – Auf Fahrbahn",
"Andere Verkehrsteilnehmer – Neben Fahrbahn",
"Verkehrszeichen",
"Spiegelbeobachtung"
]},
{title:"Fahrzeugpositionierung", items:[
"Positionierung im Fahrstreifen",
"Kommunikation durch Fahrzeugpositionierung",
"Positionierung bei Fahrmanövern"
]},
{title:"Geschwindigkeitsanpassung", items:[
"bei Gefahrenstellen",
"bei Kurven",
"bei Fahraufgaben"
]},
{title:"Kommunikation", items:[
"Durch Blinker, Hupe, Lichthupe, Handzeichen",
"Durch Fahrzeugpositionierung"
]},
{title:"Fahrzeugbedienung & Umweltschonende Fahrweise", items:[
"Umgang mit Bedienelementen",
"Vorausschauende Fahrweise",
"Schalten"
]}
];

const content = document.getElementById("content");
let data = JSON.parse(localStorage.getItem("bewertung3")) || {};

structure.forEach((section, si)=>{
  const div = document.createElement("div");
  div.className="section";

  const title = document.createElement("h2");
  title.textContent = section.title;
  div.appendChild(title);

  section.items.forEach((item, ii)=>{
    const key = si+"-"+ii;

    const row = document.createElement("div");
    row.className="row";

    const label = document.createElement("div");
    label.className="label";
    label.textContent = item;

    const smiley = document.createElement("div");
    smiley.className="smiley";

    ["🟢","🟡","🔴"].forEach((s, idx)=>{
      const span = document.createElement("span");
      span.textContent = s;
      span.onclick = ()=>{
        data[key] = data[key] || {};
        data[key].rating = idx+1;
        save();
      };
      smiley.appendChild(span);
    });

    const input = document.createElement("input");
    input.type="text";
    input.placeholder="Kommentar...";
    input.value = data[key]?.comment || "";
    input.oninput = ()=>{
      data[key] = data[key] || {};
      data[key].comment = input.value;
      save();
    };

    row.appendChild(label);
    row.appendChild(smiley);
    row.appendChild(input);
    div.appendChild(row);
  });

  content.appendChild(div);
});

function save(){
  localStorage.setItem("bewertung3", JSON.stringify(data));
  updateUI();
}

function updateUI(){
  let total = 0;
  let max = structure.reduce((sum,s)=>sum+s.items.length,0) * 3;

  let good = [], mid = [], bad = [];

  document.querySelectorAll(".row").forEach((row, index)=>{
    const spans = row.querySelectorAll("span");
    const key = Object.keys(data)[index];

    if(key && data[key]?.rating){
      spans[data[key].rating-1].classList.add("active");

      total += (4 - data[key].rating);

      const label = row.querySelector(".label").textContent;

      if(data[key].rating === 1) good.push(label);
      if(data[key].rating === 2) mid.push(label);
      if(data[key].rating === 3) bad.push(label);
    }
  });

  let percent = (total / max) * 100;
  let grade;

  if(document.getElementById("ko").checked){
    grade = 6;
  } else {
    if(percent>=92) grade=1;
    else if(percent>=81) grade=2;
    else if(percent>=67) grade=3;
    else if(percent>=50) grade=4;
    else if(percent>=30) grade=5;
    else grade=6;
  }

  document.getElementById("points").textContent = total;
  document.getElementById("percent").textContent = percent.toFixed(1);
  document.getElementById("grade").textContent = grade;

  generateFeedback(good, mid, bad);
}

function generateFeedback(good, mid, bad){
  let text = "";

  if(good.length){
    text += "Positiv: Besonders gut waren " + good.slice(0,2).join(", ") + ". ";
  }

  if(bad.length){
    text += "Verbesserung: Auffällig waren Defizite bei " + bad.slice(0,2).join(", ") + ". ";
  } else if(mid.length){
    text += "Verbesserung: Teilweise noch unsicher bei " + mid.slice(0,2).join(", ") + ". ";
  }

  if(good.length){
    text += "Abschließend: Insgesamt eine solide Leistung, insbesondere im Bereich " + good[0] + ".";
  }

  document.getElementById("feedback").value = text;
}

updateUI();
</script>

</body>
</html>
