<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bewertungsbogen Fahrlehrer</title>

<style>
body {
  font-family: Arial;
  background:#f4f6f8;
  padding:20px;
}

h1, h2 {
  margin-top:25px;
}

.section {
  background:#fff;
  padding:15px;
  border-radius:8px;
  margin-bottom:20px;
}

.row {
  display:flex;
  align-items:center;
  margin:6px 0;
}

.label {
  width:420px;
}

.smiley span {
  font-size:20px;
  cursor:pointer;
  margin-right:6px;
  opacity:0.4;
}

.smiley span.active {
  opacity:1;
}

input[type="text"] {
  flex:1;
  padding:5px;
  margin-left:10px;
}

.top {
  margin-bottom:20px;
}
</style>
</head>

<body>

<h1>Bewertungsbogen Fahrlehrer</h1>

<div class="top">
  <label><b>Name der FLA:</b></label>
  <input type="text" id="name" placeholder="Name eingeben...">
</div>

<div id="content"></div>

<script>
const structure = [
{
title:"Verkehrsbeobachtung",
items:[
"Andere Verkehrsteilnehmer – Auf Fahrbahn (Autos, LKW, Motorräder, Abstand, Geschwindigkeit, Spurwechsel)",
"Andere Verkehrsteilnehmer – Neben Fahrbahn (Fußgänger, Radfahrer, Querungsabsicht, Kinder, Haltestellen)",
"Verkehrszeichen – Erkennen, Verstehen, Umsetzung, Zusatzzeichen",
"Spiegelbeobachtung – Regelmäßigkeit, Anlassbezug, Schulterblick, Einschätzung nachfolgender Verkehr"
]
},
{
title:"Fahrzeugpositionierung",
items:[
"Positionierung im Fahrstreifen (Rechtsfahrgebot, Abstand, Fahrstreifenwahl)",
"Kommunikation durch Fahrzeugpositionierung",
"Positionierung bei Fahrmanövern (Parken, Wenden, Rückwärtsfahren)"
]
},
{
title:"Geschwindigkeitsanpassung",
items:[
"bei Gefahrenstellen",
"bei Kurven",
"bei Fahraufgaben"
]
},
{
title:"Kommunikation",
items:[
"Durch Blinker, Hupe, Lichthupe, Handzeichen",
"Durch Fahrzeugpositionierung"
]
},
{
title:"Fahrzeugbedienung & Umweltschonende Fahrweise",
items:[
"Umgang mit Bedienelementen",
"Vorausschauende Fahrweise (Gas wegnehmen, Verzögern, sanft fahren)",
"Schalten (Kupplung, Gangwahl)"
]
}
];

const content = document.getElementById("content");
let data = JSON.parse(localStorage.getItem("bewertung2")) || {};

structure.forEach((section, si)=>{
  const div = document.createElement("div");
  div.className="section";

  const title = document.createElement("h2");
  title.textContent = section.title;
  div.appendChild(title);

  section.items.forEach((item, ii)=>{
    const key = si+"-"+ii;

    const row = document.createElement("div");
    row.className="row";

    const label = document.createElement("div");
    label.className="label";
    label.textContent = item;

    const smiley = document.createElement("div");
    smiley.className="smiley";

    ["🟢","🟡","🔴"].forEach((s, idx)=>{
      const span = document.createElement("span");
      span.textContent = s;
      span.onclick = ()=>{
        data[key] = data[key] || {};
        data[key].rating = idx+1;
        save();
      };
      smiley.appendChild(span);
    });

    const input = document.createElement("input");
    input.type="text";
    input.placeholder="Kommentar...";
    input.value = data[key]?.comment || "";
    input.oninput = ()=>{
      data[key] = data[key] || {};
      data[key].comment = input.value;
      save();
    };

    row.appendChild(label);
    row.appendChild(smiley);
    row.appendChild(input);

    div.appendChild(row);
  });

  content.appendChild(div);
});

function save(){
  localStorage.setItem("bewertung2", JSON.stringify(data));
  updateUI();
}

function updateUI(){
  document.querySelectorAll(".row").forEach((row, index)=>{
    const spans = row.querySelectorAll("span");
    const keys = Object.keys(data);
    keys.forEach(k=>{
      if(data[k]?.rating){
        spans[data[k].rating-1]?.classList.add("active");
      }
    });
  });
}

updateUI();
</script>

</body>
</html>
