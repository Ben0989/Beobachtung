<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bewertungsmatrix Fahrlehrer</title>
<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
h2 { margin-top:30px; }
.row { display:flex; align-items:center; margin:8px 0; }
.label { width:350px; }
.smiley span {
  font-size:22px; cursor:pointer; margin-right:8px;
  opacity:0.4;
}
.smiley span.active { opacity:1; }
input[type="text"] {
  flex:1; padding:6px; margin-left:10px;
}
.summary {
  margin-top:30px; padding:15px; background:#fff;
  border-radius:8px;
}
button { margin-top:15px; padding:10px; }
</style>
</head>

<body>

<h1>Bewertungsmatrix</h1>

<div id="matrix"></div>

<div class="summary">
  <p><b>Punkte:</b> <span id="points">0</span></p>
  <p><b>Prozent:</b> <span id="percent">0</span>%</p>
  <p><b>Note:</b> <span id="grade">-</span></p>
  <label><input type="checkbox" id="ko"> KO-Kriterium</label>
</div>

<script>
const criteria = [
  "Andere Verkehrsteilnehmer – Fahrbahn",
  "Andere Verkehrsteilnehmer – Neben Fahrbahn",
  "Verkehrszeichen",
  "Spiegelbeobachtung",
  "Positionierung Fahrstreifen",
  "Kommunikation durch Position",
  "Positionierung Manöver",
  "Geschwindigkeit Gefahrenstellen",
  "Geschwindigkeit Kurven",
  "Geschwindigkeit Fahraufgaben",
  "Kommunikation aktiv",
  "Kommunikation passiv",
  "Fahrzeugbedienung",
  "Vorausschauendes Fahren",
  "Schalten"
];

let data = JSON.parse(localStorage.getItem("bewertung")) || {};

const matrix = document.getElementById("matrix");

criteria.forEach((c, i) => {
  const row = document.createElement("div");
  row.className = "row";

  const label = document.createElement("div");
  label.className = "label";
  label.textContent = c;

  const smiley = document.createElement("div");
  smiley.className = "smiley";

  ["🟢","🟡","🔴"].forEach((s, idx) => {
    const span = document.createElement("span");
    span.textContent = s;
    span.onclick = () => setRating(i, idx+1, span);
    smiley.appendChild(span);
  });

  const input = document.createElement("input");
  input.type = "text";
  input.placeholder = "Kommentar...";
  input.value = data[i]?.comment || "";
  input.oninput = () => {
    data[i] = data[i] || {};
    data[i].comment = input.value;
    save();
  };

  row.appendChild(label);
  row.appendChild(smiley);
  row.appendChild(input);
  matrix.appendChild(row);
});

function setRating(i, val, el){
  data[i] = data[i] || {};
  data[i].rating = val;
  save();
  updateUI();
}

function updateUI(){
  let total = 0;
  let max = criteria.length * 3;

  document.querySelectorAll(".row").forEach((row, i)=>{
    const spans = row.querySelectorAll("span");
    spans.forEach((s, idx)=>{
      s.classList.toggle("active", data[i]?.rating === idx+1);
    });
    if(data[i]?.rating){
      total += (4 - data[i].rating); // grün=3, gelb=2, rot=1
    }
  });

  let percent = (total / max) * 100;
  let grade = "-";

  if(document.getElementById("ko").checked){
    grade = 6;
  } else {
    if(percent>=92) grade=1;
    else if(percent>=81) grade=2;
    else if(percent>=67) grade=3;
    else if(percent>=50) grade=4;
    else if(percent>=30) grade=5;
    else grade=6;
  }

  document.getElementById("points").textContent = total;
  document.getElementById("percent").textContent = percent.toFixed(1);
  document.getElementById("grade").textContent = grade;
}

function save(){
  localStorage.setItem("bewertung", JSON.stringify(data));
  updateUI();
}

updateUI();
</script>

</body>
</html>
